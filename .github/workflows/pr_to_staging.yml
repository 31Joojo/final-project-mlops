name: PR to Staging - Offline Test Suite

on:
  pull_request:
    branches: ["staging"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-to-staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (API + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt
          # si certains tests touchent ml/
          if [ -f ml/requirements.txt ]; then pip install -r ml/requirements.txt; fi

      - name: Run unit + integration (exclude e2e)
        run: |
          pytest -q -m "not e2e"

      - name: Docker build (no push) - API
        run: |
          docker build -f apps/api/Dockerfile apps/api

      - name: Docker build (no push) - Web
        run: |
          docker build -f apps/web/Dockerfile apps/web
